worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstreams ─────────────────────────────────────────────────────────────

    upstream user_svc   { server user-service:8000;         keepalive 16; }
    upstream quest_svc  { server quest-service:8000;        keepalive 16; }
    upstream judge_svc  { server ai-judge-service:8000;     keepalive 8;  }
    upstream social_svc { server social-service:8000;       keepalive 16; }
    upstream notify_svc { server notification-service:8000; keepalive 16; }
    upstream market_svc { server marketplace-service:8000;  keepalive 16; }

    # ── Timeouts + buffers ────────────────────────────────────────────────────

    proxy_connect_timeout 5s;
    proxy_send_timeout    30s;
    proxy_read_timeout    60s;   # longer for ai-judge (Claude API latency)
    send_timeout          30s;

    proxy_buffer_size   16k;
    proxy_buffers       8 16k;

    # ── Shared proxy headers ──────────────────────────────────────────────────

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── Logging ───────────────────────────────────────────────────────────────

    log_format main '$remote_addr "$request" $status $body_bytes_sent '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Server ────────────────────────────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # Nginx own health check (no upstream needed)
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # Per-service health probes
        location = /health/users  { proxy_pass http://user_svc/health;  }
        location = /health/quests { proxy_pass http://quest_svc/health; }
        location = /health/judge  { proxy_pass http://judge_svc/health; }
        location = /health/social { proxy_pass http://social_svc/health; }
        location = /health/notify { proxy_pass http://notify_svc/health; }
        location = /health/market { proxy_pass http://market_svc/health; }

        # ── API routing (strips /api/<service> prefix) ────────────────────────
        #
        # Pattern: /api/users/users/123  →  user-service /users/123
        #          /api/quests/quests/1  →  quest-service /quests/1
        #          /api/quests/hints/5   →  quest-service /hints/5
        #          /api/judge/evaluate   →  ai-judge-service /evaluate

        location /api/users/  { proxy_pass http://user_svc/;   }
        location /api/quests/ { proxy_pass http://quest_svc/;  }
        location /api/judge/  { proxy_pass http://judge_svc/;  }
        location /api/social/ { proxy_pass http://social_svc/; }
        location /api/notify/ { proxy_pass http://notify_svc/; }
        location /api/market/ { proxy_pass http://market_svc/; }

        # 404 for anything else
        location / {
            return 404 '{"detail":"not found"}';
            add_header Content-Type application/json;
        }
    }
}
