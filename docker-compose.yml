version: "3.9"

services:
  # ── Databases ────────────────────────────────────────────────────────────────

  db-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-quest:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quest_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_quest:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quest_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-judge:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: judge_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg_judge:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d judge_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-social:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pg_social:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - pg_notification:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-marketplace:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketplace_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - pg_marketplace:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace_service"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # ── Services ─────────────────────────────────────────────────────────────────

  user-service:
    build: ./services/user-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db-user:5432/user_service
    depends_on:
      db-user:
        condition: service_healthy

  quest-service:
    build: ./services/quest-service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db-quest:5432/quest_service
    depends_on:
      db-quest:
        condition: service_healthy

  ai-judge-service:
    build: ./services/ai-judge-service
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db-judge:5432/judge_service
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      db-judge:
        condition: service_healthy

  social-service:
    build: ./services/social-service
    ports:
      - "8004:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db-social:5432/social_service
    depends_on:
      db-social:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    ports:
      - "8005:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db-notification:5432/notification_service
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      db-notification:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  marketplace-service:
    build: ./services/marketplace-service
    ports:
      - "8006:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db-marketplace:5432/marketplace_service
    depends_on:
      db-marketplace:
        condition: service_healthy

  bot-service:
    build: ./services/bot-service
    ports:
      - "8080:8080"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8000
      QUEST_SERVICE_URL: http://quest-service:8000
      JUDGE_SERVICE_URL: http://ai-judge-service:8000
      SOCIAL_SERVICE_URL: http://social-service:8000
      NOTIFICATION_SERVICE_URL: http://notification-service:8000
      MARKETPLACE_SERVICE_URL: http://marketplace-service:8000
      # TEST MODE: auto-approve quest answers without calling the AI judge.
      # Set to "true" (or remove) to restore real AI evaluation.
      AI_JUDGE_ENABLED: "false"
      # Comma-separated Telegram IDs with access to the /admin panel.
      ADMIN_IDS: ${ADMIN_IDS:-}
    depends_on:
      - redis
      - rabbitmq
      - user-service
      - quest-service
      - ai-judge-service
      - social-service
      - notification-service
      - marketplace-service

volumes:
  pg_marketplace:
  pg_user:
  pg_quest:
  pg_judge:
  pg_social:
  pg_notification:
