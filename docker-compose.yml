version: "3.9"

services:
  db-user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_user:/var/lib/postgresql/data

  db-quest:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quest_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pg_quest:/var/lib/postgresql/data

  db-judge:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: judge_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg_judge:/var/lib/postgresql/data

  db-social:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - pg_social:/var/lib/postgresql/data

  db-notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - pg_notification:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  pg_user:
  pg_quest:
  pg_judge:
  pg_social:
  pg_notification:
